<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Navidrome AI 歌单生成器 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .glow {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md glow">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🎵</div>
            <h1 class="text-2xl font-bold text-white">Navidrome AI 歌单生成器</h1>
            <p class="text-gray-400 mt-2">输入密码以继续</p>
        </div>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-lg mb-6 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-6">
                <input
                    type="password"
                    name="password"
                    placeholder="请输入访问密码"
                    autofocus
                    class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/50 text-center text-lg tracking-widest"
                >
            </div>
            <button
                type="submit"
                class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition duration-200 transform hover:scale-[1.02]"
            >
                进入
            </button>
        </form>

        <p class="text-gray-500 text-sm text-center mt-6">
            Powered by AI × Navidrome
        </p>
    </div>
</body>
</html>
