services:
  navidrome-ai-playlist:
    build: .
    # 若不想本地构建，可用预构建镜像（打 tag 后由 GitHub Actions 自动推送到 ghcr.io）：
    # image: ghcr.io/<你的用户名>/<仓库名>:latest
    container_name: navidrome-ai-playlist
    restart: unless-stopped
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      PORT: "8899"
